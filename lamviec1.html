<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="giaodien1.css">
    <title>⏳Hệ Thống Nhắc Nhở</title>
</head>
<body>
    <div class="container">
        <h1>Quản Lý Nhắc Nhở</h1>
        <div id="status">Hệ thống đang dừng</div>
        
        <div id="history">
            <strong>Lịch sử thông báo:</strong>
        </div>
        
        <div class="controls">
            <button onclick="playTest('8h')">Thử Ca 8h</button>
            <button onclick="playTest('10h')">Thử Ca 10h</button>
            <button onclick="playTest('an')">Thử Giờ Ăn</button>
            <br>
            <button id="toggleBtn" onclick="toggleSystem()">Bật Chương Trình</button>
        </div>
    </div>

    <audio id="sound8h" src="ca8.mp3"></audio>
    <audio id="sound10h" src="ca10.mp3"></audio>
    <audio id="soundAn" src="an.mp3"></audio>

    <script src="xuly1.js"></script>
</body>
</html>
